name: Distro matrix

# Verifies Fresco builds, packages, installs, and runs on every supported
# distro from the README "Supported distros" table. GitHub only offers Ubuntu
# runners, so each distro runs inside its own container.
#
# Per distro we do TWO things, because they answer two different questions:
#   build  — does it compile and pass tests against THIS distro's libraries?
#   install — on a CLEAN machine, do the declared runtime deps resolve and do
#             the binaries actually load (frescod --check + ldd -r)?
#
# Each distro builds its OWN .deb. We do NOT build once and install everywhere:
# Ubuntu 22.04 ships libmpv.so.1 while 24.04/Debian 12 ship libmpv.so.2, so a
# cross-distro .deb would fail at load for native-packaging reasons, not bugs.
#
# Pop!_OS and elementary OS have no official container images; both are Ubuntu
# 22.04 derivatives, so we run them on ubuntu:22.04 and add their repos.
#
# Deepin 25 "crimson" uses the official linuxdeepin/deepin:crimson image
# (beige = V23). It is apt-based with a Debian 12-generation library set
# (libmpv2), and its repos carry every build dep, so the standard bootstrap
# works. Coverage added for the packaging/runtime bugs a Deepin 25 user hit
# in issues #1 and #2.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC — catch upstream package drift

env:
  RUST_VERSION: '1.91.0'
  # Fresco's own build deps, plus (last two lines) what scripts/build-mpvpaper.sh
  # needs to compile the bundled Wayland renderer.
  BUILD_DEPS: >-
    libgtk-4-dev libadwaita-1-dev ffmpegthumbnailer
    libmpv-dev libx11-dev libxrandr-dev
    meson ninja-build libwayland-dev wayland-protocols
    libegl1-mesa-dev libgl1-mesa-dev

jobs:
  build:
    name: build · ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: ubuntu-2204,   name: 'Ubuntu 22.04',   image: 'ubuntu:22.04' }
          - { id: ubuntu-2404,   name: 'Ubuntu 24.04',   image: 'ubuntu:24.04' }
          - { id: debian-12,     name: 'Debian 12',      image: 'debian:12' }
          - { id: mint-21,       name: 'Linux Mint 21',  image: 'linuxmintd/mint21-amd64' }
          - { id: mint-22,       name: 'Linux Mint 22',  image: 'linuxmintd/mint22-amd64' }
          - { id: popos-2204,    name: 'Pop!_OS 22.04',  image: 'ubuntu:22.04', repo: 'ppa:system76/pop' }
          - { id: elementary-7,  name: 'elementary OS 7', image: 'ubuntu:22.04', repo: 'ppa:elementary-os/stable' }
          - { id: deepin-25,     name: 'Deepin 25',      image: 'linuxdeepin/deepin:crimson' }
    steps:
      - name: Bootstrap container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            ca-certificates curl build-essential pkg-config git

      - name: Add distro repo (Pop!_OS / elementary)
        if: matrix.repo != ''
        env:
          DEBIAN_FRONTEND: noninteractive
        # Best-effort: these PPAs reflect each distro's real package set, but a
        # Launchpad hiccup must not fail an otherwise-valid build.
        run: |
          apt-get install -y --no-install-recommends software-properties-common
          add-apt-repository -y "${{ matrix.repo }}" || echo "::warning::could not add ${{ matrix.repo }}"
          apt-get update -q || true

      - uses: actions/checkout@v4

      - name: Install build deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: apt-get install -y --no-install-recommends $BUILD_DEPS

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain "$RUST_VERSION" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build (all features)
        run: cargo build --release --all-features

      - name: Test (daemon)
        run: cargo test --no-default-features --features daemon

      # The release ships one mpvpaper per libmpv generation (see _release.yml).
      # A per-distro test deb builds once against THIS distro's libmpv and fills
      # both asset slots with that build, keeping cargo-deb's asset list
      # identical to the release layout; the runtime probe picks whichever loads.
      - name: Build bundled mpvpaper (Wayland backend)
        run: |
          scripts/build-mpvpaper.sh
          cp target/release/mpvpaper target/release/mpvpaper-libmpv1
          mv target/release/mpvpaper target/release/mpvpaper-libmpv2

      - name: Package .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.id }}
          path: target/debian/fresco_*.deb
          if-no-files-found: error

  install:
    name: install · ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: ubuntu-2204,   name: 'Ubuntu 22.04',   image: 'ubuntu:22.04' }
          - { id: ubuntu-2404,   name: 'Ubuntu 24.04',   image: 'ubuntu:24.04' }
          - { id: debian-12,     name: 'Debian 12',      image: 'debian:12' }
          - { id: mint-21,       name: 'Linux Mint 21',  image: 'linuxmintd/mint21-amd64' }
          - { id: mint-22,       name: 'Linux Mint 22',  image: 'linuxmintd/mint22-amd64' }
          - { id: popos-2204,    name: 'Pop!_OS 22.04',  image: 'ubuntu:22.04', repo: 'ppa:system76/pop' }
          - { id: elementary-7,  name: 'elementary OS 7', image: 'ubuntu:22.04', repo: 'ppa:elementary-os/stable' }
          - { id: deepin-25,     name: 'Deepin 25',      image: 'linuxdeepin/deepin:crimson' }
    steps:
      # NOTE: a CLEAN container — no -dev packages. apt must resolve every
      # runtime dependency declared in Cargo.toml [package.metadata.deb] on its
      # own. This is the real "is it installable & usable" test.
      - name: Bootstrap container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends ca-certificates binutils

      - name: Add distro repo (Pop!_OS / elementary)
        if: matrix.repo != ''
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get install -y --no-install-recommends software-properties-common
          add-apt-repository -y "${{ matrix.repo }}" || echo "::warning::could not add ${{ matrix.repo }}"
          apt-get update -q || true

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-${{ matrix.id }}
          path: deb

      - name: Install .deb
        env:
          DEBIAN_FRONTEND: noninteractive
        # ./ prefix so apt treats it as a local file, not a package name.
        run: |
          DEB="./$(ls deb/fresco_*.deb | head -1)"
          echo "Installing $DEB"
          apt-get install -y "$DEB"

      - name: Smoke test — icon + .desktop are installed (issue #1)
        # Deepin 25's icon theme never fell back to scalable/, so the app icon
        # was missing until raster hicolor sizes shipped. Assert every icon the
        # .deb declares actually lands on disk, both via dpkg's file list and
        # directly, and that the .desktop Icon= name matches the icon basename.
        run: |
          set -e
          APP=io.github.dibbayajyotiroy.Fresco
          fail=0
          files="/usr/share/icons/hicolor/scalable/apps/$APP.svg"
          for size in 48x48 64x64 128x128 256x256 512x512; do
            files="$files /usr/share/icons/hicolor/$size/apps/$APP.png"
          done
          for f in $files; do
            if ! dpkg -L fresco | grep -qx "$f"; then
              echo "::error::$f not declared in the fresco package"
              fail=1
            fi
            if [ ! -f "$f" ]; then
              echo "::error::$f missing on disk after install"
              fail=1
            else
              echo "ok: $f"
            fi
          done
          desktop=/usr/share/applications/$APP.desktop
          if [ ! -f "$desktop" ]; then
            echo "::error::$desktop missing on disk after install"
            fail=1
          elif ! grep -qx "Icon=$APP" "$desktop"; then
            echo "::error::$desktop Icon= does not match '$APP'"
            grep '^Icon=' "$desktop" || echo "(no Icon= line)"
            fail=1
          else
            echo "ok: $desktop Icon=$APP"
          fi
          exit $fail

      - name: Smoke test — binaries load all shared libraries
        # ldd -r resolves data + function relocations; a missing lib or symbol
        # prints "not found" / "undefined symbol". Fail loudly if any appear.
        run: |
          set -e
          for bin in fresco frescod; do
            echo "== ldd -r $bin =="
            out="$(ldd -r "$(command -v "$bin")")"
            echo "$out"
            if echo "$out" | grep -E 'not found|undefined symbol'; then
              echo "::error::$bin has unresolved shared-library dependencies"
              exit 1
            fi
          done

      - name: Smoke test — frescod --check runs
        # Headless: no X11, no GPU. --check dlopens libmpv and prints
        # diagnostics, exiting 0 regardless — proves libmpv resolves at runtime.
        run: frescod --check

      - name: Smoke test — a bundled renderer loads this distro's libmpv
        # Exit 127 = the dynamic linker couldn't find the libmpv soname the
        # renderer was linked against — the failure that shipped invisible
        # wallpapers to Ubuntu 24.04/COSMIC users in 1.1.0. A file-exists check
        # can't catch it; actually executing the binary can.
        run: |
          ok=0
          for bin in /usr/lib/fresco/mpvpaper-libmpv2 /usr/lib/fresco/mpvpaper-libmpv1 /usr/lib/fresco/mpvpaper; do
            [ -x "$bin" ] || continue
            rc=0; "$bin" --help >/dev/null 2>&1 || rc=$?
            echo "$bin --help → exit $rc"
            [ "$rc" -ne 127 ] && ok=1
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::no bundled mpvpaper can load this distro's libmpv"
            exit 1
          fi

  # ── Release parity: the EXACT artifact users download ───────────────────────
  # The published .deb is built ONCE on ubuntu-22.04 with one mpvpaper per
  # libmpv generation, then installed by users on every distro generation.
  # These jobs replicate that artifact and cross-install it — the 1.1.0
  # regression (renderer hard-linked to libmpv.so.1 dying with exit 127 on
  # Ubuntu 24.04 / COSMIC while every same-distro test passed) is exactly the
  # class of failure only this cross-generation path can catch.
  release-parity-mpvpaper-libmpv2:
    name: parity · mpvpaper (libmpv2)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libmpv-dev meson ninja-build pkg-config git ca-certificates \
            libwayland-dev wayland-protocols libegl1-mesa-dev libgl1-mesa-dev
      - name: Build mpvpaper (libmpv2)
        run: scripts/build-mpvpaper.sh
      - uses: actions/upload-artifact@v4
        with:
          name: parity-mpvpaper-libmpv2
          path: target/release/mpvpaper
          if-no-files-found: error

  release-parity-deb:
    name: parity · build release-style .deb
    needs: release-parity-mpvpaper-libmpv2
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends $BUILD_DEPS
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-parity-${{ hashFiles('Cargo.lock') }}
      - name: Build release
        run: cargo build --release --all-features --locked
      - name: Build mpvpaper (libmpv1)
        run: |
          scripts/build-mpvpaper.sh
          mv target/release/mpvpaper target/release/mpvpaper-libmpv1
      - uses: actions/download-artifact@v4
        with:
          name: parity-mpvpaper-libmpv2
          path: parity-mpvpaper
      - name: Stage mpvpaper (libmpv2)
        run: install -m 755 parity-mpvpaper/mpvpaper target/release/mpvpaper-libmpv2
      - name: Package .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --no-strip
      - uses: actions/upload-artifact@v4
        with:
          name: parity-deb
          path: target/debian/fresco_*.deb
          if-no-files-found: error

  release-parity-install:
    name: parity · install on ${{ matrix.name }}
    needs: release-parity-deb
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'Ubuntu 22.04 (libmpv1)', image: 'ubuntu:22.04' }
          - { name: 'Ubuntu 24.04 (libmpv2)', image: 'ubuntu:24.04' }
          - { name: 'Debian 12 (libmpv2)',    image: 'debian:12' }
    steps:
      - name: Bootstrap container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends ca-certificates binutils
      - uses: actions/download-artifact@v4
        with:
          name: parity-deb
          path: deb
      - name: Install the release-style .deb
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          DEB="./$(ls deb/fresco_*.deb | head -1)"
          echo "Installing $DEB"
          apt-get install -y "$DEB"
      - name: frescod --check
        run: frescod --check
      - name: A bundled renderer must load THIS distro's libmpv
        run: |
          ok=0
          for bin in /usr/lib/fresco/mpvpaper-libmpv2 /usr/lib/fresco/mpvpaper-libmpv1 /usr/lib/fresco/mpvpaper; do
            [ -x "$bin" ] || continue
            rc=0; "$bin" --help >/dev/null 2>&1 || rc=$?
            echo "$bin --help → exit $rc"
            [ "$rc" -ne 127 ] && ok=1
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::release .deb has no renderer that loads on this distro — 1.1.0 regression"
            exit 1
          fi
