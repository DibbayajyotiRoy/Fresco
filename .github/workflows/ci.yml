name: CI

# Pre-merge gate. Every pull request to main runs the strict build/lint/test lane
# AND the headless desktop-environment matrix, so problems are caught before they
# land. Push-to-main runs the same gate (plus publishing) via publish.yml.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/_ci.yml

  environments:
    uses: ./.github/workflows/_environments.yml
    with:
      min_pass: '3'
