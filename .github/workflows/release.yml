name: Release

# Manual / explicit release path: pushing a v* tag builds and publishes that
# tag. The automatic path (publish.yml) calls the same reusable _release.yml
# after the push-to-main test gate passes, so both routes are identical.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/_release.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
